kind = "mobile"
previewPath = "/"
title = "Medical Reminders"
version = "1.0.0"
id = "artifacts/medical-reminders"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25341

[services.development]
run = "pnpm --filter @workspace/medical-reminders run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medical-reminders", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/medical-reminders", "run", "serve" ]

[services.env]
PORT = "25341"
BASE_PATH = "/"
